name: Deploy (EC2)

# Manual trigger only — deploys the envs/ec2 Terraform stack + EC2 services.
# Uses the deploy-user AWS access key (stored in GitHub Secrets) to run
# `./deploy/scripts/deploy.sh`, which handles:
#   - bootstrap S3 bucket (one-time)
#   - terraform apply for envs/ec2
#   - docker build + ECR push
#   - .env.live sync + systemctl restart via SSM
#
# See deploy/terraform/.design.md for the full architecture.

on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: "Auto-approve terraform apply (off = dry-run / plan only)"
        type: boolean
        default: true
      skip_docker:
        description: "Skip docker build + ECR push (infra-only reapply)"
        type: boolean
        default: false

# Serialize deploys — no two runs of this workflow race the same Terraform state.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: terraform apply + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: mongodb-aws-bedrock-multi-agent-framework

    env:
      AWS_REGION: us-east-1
      CI_ENV_FILE: /tmp/ci-env.sh

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # ── AWS auth ─────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      # ── Materialize env file from GitHub Secrets ─────────────────────────────
      # deploy.sh sources an env file and expects a specific set of variables.
      # We recreate that shape here from CI secrets so the script runs unchanged.
      - name: Write CI env file
        working-directory: ${{ github.workspace }}
        env:
          MONGODB_ATLAS_PUBLIC_KEY:  ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          MONGODB_ATLAS_PRIVATE_KEY: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}
          MONGODB_ATLAS_ORG_ID:      ${{ secrets.MONGODB_ATLAS_ORG_ID }}
          MONGODB_ATLAS_PROJECT_ID:  ${{ secrets.MONGODB_ATLAS_PROJECT_ID }}
          MONGODB_PASSWORD:          ${{ secrets.MONGODB_PASSWORD }}
          VOYAGE_MODEL_PACKAGE_ARN:  ${{ secrets.VOYAGE_MODEL_PACKAGE_ARN }}
        run: |
          set -euo pipefail
          required=(
            MONGODB_ATLAS_PUBLIC_KEY
            MONGODB_ATLAS_PRIVATE_KEY
            MONGODB_ATLAS_ORG_ID
            MONGODB_ATLAS_PROJECT_ID
            MONGODB_PASSWORD
          )
          missing=()
          for v in "${required[@]}"; do
            [[ -n "${!v:-}" ]] || missing+=("$v")
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions"
            exit 1
          fi

          umask 077
          cat > "$CI_ENV_FILE" <<EOF
          #!/bin/bash
          # Generated by .github/workflows/deploy.yml at $(date -u +%FT%TZ)
          # Consumed by deploy.sh via --env-file
          export MONGODB_ATLAS_PUBLIC_KEY="${MONGODB_ATLAS_PUBLIC_KEY}"
          export MONGODB_ATLAS_PRIVATE_KEY="${MONGODB_ATLAS_PRIVATE_KEY}"
          export TF_VAR_mongodb_atlas_org_id="${MONGODB_ATLAS_ORG_ID}"
          export TF_VAR_mongodb_atlas_project_id="${MONGODB_ATLAS_PROJECT_ID}"
          export TF_VAR_mongodb_password="${MONGODB_PASSWORD}"
          export VOYAGE_MODEL_PACKAGE_ARN="${VOYAGE_MODEL_PACKAGE_ARN:-}"
          EOF
          echo "Wrote $CI_ENV_FILE ($(wc -l < "$CI_ENV_FILE") lines)"

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Run deploy.sh
        run: |
          set -euo pipefail
          args=( "--env-file" "$CI_ENV_FILE" )
          [[ "${{ inputs.auto_approve }}" == "true" ]] && args+=( "--auto-approve" )
          [[ "${{ inputs.skip_docker }}"  == "true" ]] && args+=( "--skip-docker" )
          ./deploy/scripts/deploy.sh "${args[@]}"

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload deploy manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest-${{ github.run_id }}
          path: mongodb-aws-bedrock-multi-agent-framework/deploy-manifest.json
          if-no-files-found: ignore
          retention-days: 30

      # ── Cleanup ──────────────────────────────────────────────────────────────
      - name: Remove CI env file
        if: always()
        working-directory: ${{ github.workspace }}
        run: rm -f "$CI_ENV_FILE"
