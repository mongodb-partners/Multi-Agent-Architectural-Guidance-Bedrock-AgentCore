# Full stack: API + Streamlit. From repo root:
#   docker compose up --build
#
# The API is a thin proxy in front of an AgentCore Runtime, so it requires
# AGENTCORE_ORCHESTRATOR_ARN (or legacy AGENTCORE_RUNTIME_ARN) and AWS
# credentials at runtime. Set them in `.env` next to compose.yaml or in your
# shell before running `docker compose up`.

name: bedrock-multi-agent

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      AGENTCORE_ORCHESTRATOR_ARN: "${AGENTCORE_ORCHESTRATOR_ARN:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      # JWKS auth is required (assertJwksAuthConfigured() in api/src/index.ts).
      # Set in your .env next to compose.yaml so the API can boot.
      AUTH_JWKS_URI: "${AUTH_JWKS_URI:-}"
      AUTH_ISSUER: "${AUTH_ISSUER:-}"
      # Optional: MONGODB_URI, PERSIST_CHAT_SESSIONS=1, AGENTCORE_GATEWAY_URL,
      # AUTH_APP_CLIENT_ID, AUTH_TOKEN_USE, etc.
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ui:
    build:
      context: ui
      dockerfile: Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      STREAMLIT_API_URL: http://api:3000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      # The API requires Cognito JWKS auth — set the same Cognito pool here so the UI
      # can mint Bearer tokens (see .env.example — matching AUTH_* on api):
      # STREAMLIT_COGNITO_POOL_ID: ...
      # STREAMLIT_COGNITO_CLIENT_ID: ...
      # STREAMLIT_COGNITO_CLIENT_SECRET: ...
      # STREAMLIT_COGNITO_DOMAIN: your-domain.auth.region.amazoncognito.com
      # STREAMLIT_COGNITO_REDIRECT_URI: http://localhost:8501/
    depends_on:
      api:
        condition: service_healthy
